<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="hex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6ff0"/>
      <stop offset="100%" style="stop-color:#6b4fdb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Hexagon -->
  <polygon points="256,36 450,148 450,364 256,476 62,364 62,148"
    fill="none" stroke="url(#hex)" stroke-width="28" stroke-linejoin="round"
    filter="url(#glow)"/>
  <!-- H lettermark — vertically centered using dominant-baseline -->
  <text x="256" y="256" text-anchor="middle" dominant-baseline="central"
    font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="200"
    fill="url(#hex)" opacity=".95">H</text>
</svg>
