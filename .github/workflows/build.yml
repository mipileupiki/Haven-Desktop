name: Build Haven Desktop

on:
  push:
    tags:
      - 'v*'          # Trigger on version tags like v1.0.0
  workflow_dispatch:    # Manual trigger from GitHub UI

permissions:
  contents: write      # Needed to create releases

jobs:
  # ─── Windows Build ──────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build native audio addon
        run: npm run build:native

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: haven-desktop-windows
          path: |
            dist/*.exe
          retention-days: 30

  # ─── Linux Build ────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install PulseAudio dev headers
        run: sudo apt-get update && sudo apt-get install -y libpulse-dev

      - name: Install dependencies
        run: npm install

      - name: Build native audio addon
        run: npm run build:native

      - name: Build Linux packages
        run: npx electron-builder --linux --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: haven-desktop-linux
          path: |
            dist/*.AppImage
            dist/*.deb
          retention-days: 30

  # ─── Create GitHub Release ──────────────────────────────
  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Haven Desktop ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/haven-desktop-windows/*.exe
            artifacts/haven-desktop-linux/*.AppImage
            artifacts/haven-desktop-linux/*.deb
